faq1Summary: "__Como instalo a versão PRO após a compra?__"
faq1Content: >
  Você já tem a versão PRO instalada! Tudo o que é necessário é ativá-la. Após a compra, você receberá um e-mail do comerciante
  com instruções sobre como reivindicar a chave de licença. _A ativação ocorre diretamente no VS Code e leva apenas alguns segundos_:<br><br>
  Abra a __Paleta de comandos__ e digite __"Ativar Chave de Licença"__. Alternativamente, você pode abrir o diálogo __"Atualizar para PRO"__
  em uma aba do SQLite Viewer, rolar até o final da página e clicar em __"Inserir Chave de Licença"__. Um campo de entrada será aberto
  no topo da janela do VS Code. Cole a chave de licença e pressione enter. Um diálogo do sistema confirmará a ativação em alguns segundos.
faq2Summary: "Posso usar a versão PRO em múltiplos dispositivos?"
faq2Content: >
  Você pode ativar SQLite Viewer PRO em um _número ilimitado de dispositivos_, e usá-lo em _até 3 dispositivos simultaneamente_.<br><br>
  Existem algumas restrições na frequência de ativação, mas estas estão apenas em vigor para prevenir compartilhamento/publicação de chaves e outros abusos.
  _A grande maioria dos clientes nunca encontra problemas de licenciamento_.
faq3Summary: "Como funciona a ativação de licença offline?"
faq3Content: >
  Ao selecionar __"Ativação de Licença Offline"__ da __Paleta de comandos__, você será redirecionado para a página de ativação offline.
  _Você pode abrir esta página em qualquer dispositivo_. Digite sua chave de licença e você receberá um token de ativação.
  Você pode então enviar este token para o dispositivo de destino através de qualquer canal (ex. email, Slack, pendrive)
  e colá-lo no campo de entrada no final do assistente de Ativação de Licença Offline. Nenhuma conexão com a internet é necessária para verificar o token.<br><br>
  Dispositivos registrados através deste método nunca tentarão se conectar ao servidor de licença,
  desde que uma chave Business Edition tenha sido usada e a caixa "Avaliação Business Edition" não tenha sido marcada ao gerar o token.
faq4Summary: "Como solicito um reembolso?"
faq4Content: >
  Para solicitar um reembolso, entre em contato com [*refunds@sqliteviewer.app*](mailto:refunds@sqliteviewer.app) com o endereço de e-mail usado na compra.<br><br>
  O SQLite Viewer PRO inclui uma __Garantia de Reembolso de 14 dias__. Durante este período, você pode solicitar reembolso total por qualquer motivo — sem necessidade de explicação.
  Reembolsos fora da janela de 14 dias são considerados apenas em certas circunstâncias. Para mais detalhes, consulte a página [Reembolsos](/refunds.html).
faq5Summary: "Quais formatos de data e hora são suportados?"
faq5Content: >
  O SQLite Viewer PRO suporta uma ampla gama de formatos de data e hora para colunas definidas como `DATE` ou `DATETIME`. Os formatos de entrada suportados incluem:<br><br>
  • Strings no estilo ISO do SQLite<br>
  • Strings ISO-8601<br>
  • Números de dia juliano<br>
  • Segundos desde 1970 (timestamp Unix)<br>
  • Milissegundos desde 1970<br>
  • Microssegundos desde 1970<br>
  • Data serial do Excel (sistema 1900)<br>
  • Windows FILETIME desde 1601<br>
  • .NET Ticks desde 0001<br><br>
  Quando uma data válida é reconhecida, ela pode ser exibida em um de 4 formatos:<br>
  • Strings localizadas legíveis (padrão)<br>
  • Strings localizadas do tipo "há X" (ex. "há 6 meses")<br>
  • Strings ISO-8601 para máquinas<br>
  • Valores brutos<br><br>
  Os valores podem ser editados usando um seletor de data genérico ou modificando a string ISO interpretada. A extensão preserva o formato original ao salvar em disco.
faq6Summary: "Posso usar a versão PRO para visualizar bancos de dados de produção?"
faq6Content: >
  Sim, mas é altamente recomendável fazer preparativos.<br><br>
  Se você pretende apenas visualizar dados, abra o banco de dados ao vivo em modo somente leitura para evitar modificação acidental.
  Clique com o botão direito no arquivo, clique em __"Abrir com…"__ e selecione __"SQLite Viewer (somente leitura)"__.<br><br>
  Se você pretende modificar o banco de dados ao vivo, é altamente recomendável ativar a função __"Sqlite Viewer: Instant Commit"__ no menu de configurações do VS Code.
  Isso impedirá que a extensão abra transações de longa duração que poderiam bloquear outros processos SQLite que acessam o mesmo banco de dados.
  No entanto, observe que a funcionalidade de desfazer/refazer pode ser limitada neste modo.<br><br>
footnote1: >
  A ativação offline é necessária se um firewall corporativo impedir a extensão de se conectar ao servidor de licença.
footnote2: >
  Quando um dispositivo é registrado através da ativação offline, a extensão pode ser usada sem precisar se reconectar ao servidor de licença.
