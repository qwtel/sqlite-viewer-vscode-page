faq1Summary: "__¿Cómo instalo la versión PRO después de la compra?__"
faq1Content: >
  ¡Ya tienes instalada la versión PRO! Todo lo que se necesita es activarla. Después de completar la compra, recibirás un correo electrónico del comerciante
  con instrucciones sobre cómo reclamar la clave de licencia. _La activación se realiza directamente en VS Code y solo toma unos segundos_:<br><br>
  Abre la __Paleta de comandos__ y escribe __"Activar Clave de Licencia"__. Alternativamente, puedes abrir el diálogo __"Actualizar a PRO"__
  en una pestaña de SQLite Viewer, desplazarte hasta el final de la página y hacer clic en __"Ingresar Clave de Licencia"__. Se abrirá un campo de entrada
  en la parte superior de la ventana de VS Code. Pega la clave de licencia y presiona enter. Un diálogo del sistema confirmará la activación en unos segundos.
faq2Summary: "¿Puedo usar la versión PRO en múltiples dispositivos?"
faq2Content: >
  Puedes activar SQLite Viewer PRO en un _número ilimitado de dispositivos_, y usarlo en _hasta 3 dispositivos simultáneamente_.<br><br>
  Hay algunas restricciones en la frecuencia de activación, pero estas están únicamente en su lugar para prevenir el intercambio/publicación de claves y otros abusos.
  _La gran mayoría de los clientes nunca encuentran problemas de licenciamiento_.
faq3Summary: "¿Cómo funciona la activación de licencia offline?"
faq3Content: >
  Al seleccionar __"Activación de Licencia Offline"__ desde la __Paleta de comandos__, serás redirigido a la página de activación offline.
  _Puedes abrir esta página en cualquier dispositivo_. Ingresa tu clave de licencia y recibirás un token de activación.
  Puedes enviar este token al dispositivo destinado a través de cualquier canal (ej. email, Slack, USB dongle)
  y pegarlo en el campo de entrada al final del asistente de Activación de Licencia Offline. No se requiere conexión a internet para verificar el token.<br><br>
  Los dispositivos registrados a través de este método nunca intentarán conectarse al servidor de licencias,
  siempre que se haya usado una clave Business Edition y la casilla "Evaluación Business Edition" no haya sido marcada al generar el token.
faq4Summary: "¿Cómo solicito un reembolso?"
faq4Content: >
  Para solicitar un reembolso, contacta a [*refunds@sqliteviewer.app*](mailto:refunds@sqliteviewer.app) con la dirección de correo electrónico utilizada en la compra.<br><br>
  SQLite Viewer PRO incluye una __Garantía de Reembolso de 14 días__. Durante este período, puedes solicitar un reembolso completo por cualquier motivo — no se requiere explicación.
  Los reembolsos fuera del período de 14 días solo se consideran en ciertas circunstancias. Para más detalles, consulta la página de [Reembolsos](/refunds.html).
faq5Summary: "¿Qué formatos de fecha y hora se admiten?"
faq5Content: >
  SQLite Viewer PRO admite una amplia gama de formatos de fecha y hora para columnas definidas como `DATE` o `DATETIME`. Los formatos de entrada admitidos incluyen:<br><br>
  • Cadenas tipo ISO de SQLite<br>
  • Cadenas ISO-8601<br>
  • Números de día juliano<br>
  • Segundos desde 1970 (timestamp Unix)<br>
  • Milisegundos desde 1970<br>
  • Microsegundos desde 1970<br>
  • Fecha serial de Excel (sistema 1900)<br>
  • Windows FILETIME desde 1601<br>
  • .NET Ticks desde 0001<br><br>
  Cuando se reconoce una fecha válida, puede mostrarse en uno de 4 formatos:<br>
  • Cadenas localizadas legibles (predeterminado)<br>
  • Cadenas localizadas de tiempo relativo (ej. "hace 6 meses")<br>
  • Cadenas ISO-8601 para máquinas<br>
  • Valores sin procesar<br><br>
  Los valores pueden editarse con un selector de fecha genérico o modificando la cadena ISO interpretada. La extensión preserva el formato original al guardar en disco.
faq6Summary: "¿Puedo usar la versión PRO para ver bases de datos de producción?"
faq6Content: >
  Sí, pero se recomienda encarecidamente tomar precauciones.<br><br>
  Si solo pretendes ver datos, abre la base de datos en vivo en modo solo lectura para evitar modificaciones accidentales.
  Clic derecho en el archivo, clic en __"Abrir con…"__ y selecciona __"SQLite Viewer (solo lectura)"__.<br><br>
  Si pretendes modificar la base de datos en vivo, se recomienda encarecidamente activar la función __"Sqlite Viewer: Instant Commit"__ en la configuración de VS Code.
  Esto evitará que la extensión abra transacciones de larga duración que podrían bloquear otros procesos SQLite que accedan a la misma base de datos.
  Ten en cuenta que la funcionalidad de deshacer/rehacer puede ser limitada en este modo.<br><br>
footnote1: >
  La activación offline es necesaria si un firewall corporativo impide que la extensión se conecte al servidor de licencias.
footnote2: >
  Cuando un dispositivo se registra a través de la activación offline, la extensión se puede usar sin necesidad de volver a conectarse al servidor de licencias.
