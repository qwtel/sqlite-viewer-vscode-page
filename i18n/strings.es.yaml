card1H: "Exportar datos en varios formatos"
card1P: >
  Puedes copiar filas directamente desde el visor en varios formatos. Los formatos compatibles son:
  TSV, CSV, inserciones de SQLite, objetos JSON, arrays JSON, HTML y Markdown.
card2H: "Actualizar valores en el lugar"
card2P: >
  Actualiza valores desde la barra lateral o el modal. Todos los cambios se envuelven automáticamente en una transacción
  y se confirman en el disco cuando se guarda el archivo.
card3H: "Insertar y eliminar filas"
card3P: >
  Inserta una o más filas usando el cuadro de diálogo modal. Elimina una o más filas desde el explorador o usando
  atajos de teclado.
card4H: "Deshacer y rehacer cambios usando VS Code"
card4P: >
  SQLite Viewer PRO se integra con el historial de deshacer/rehacer de VS Code. Los cambios se revierten a través de instrucciones `ROLLBACK`
  antes de que se guarde un archivo, y ejecutando instrucciones SQL (invertidas) después.
card5H: "Funciona en contenedores, SSH y WSL"
card5P: >
  SQLite Viewer PRO se puede instalar dentro de contenedores, hosts SSH e instancias WSL. Una instancia nativa de SQLite
  se ejecuta junto con la base de datos en el espacio de trabajo remoto, mientras que solo la vista web permanece en la máquina local.
sectionTitleI: "Rediseñado desde cero para las demandas PRO"
sectionParagraphI: >
  Puedes pensar en la versión PRO como _SQLite Viewer 2_.
  No son solo banderas de características, sino un motor completamente nuevo bajo el capó. Viene con garantías de failover de SQLite y soporte para archivos grandes.
feat1H: "Cliente SQLite Nativo"
feat1P: >
  La versión PRO utiliza la __implementación oficial de SQLite__, que proporciona el conjunto completo de garantías de failover.
  El antiguo cliente de solo lectura permanece como respaldo.
feat2H: "Tamaño de archivo ilimitado"
feat2P: >
  Se eliminan todas las restricciones sobre el tamaño del archivo, __incluso durante sesiones remotas__. Solo los datos necesarios para renderizar la interfaz
  se transfieren a tu máquina local.
feat3H: "Experiencia sin anuncios"
feat3P: >
  Los clientes PRO disfrutan de una experiencia sin anuncios — __perfecta para compartir pantalla y grabaciones__. Además, los clientes PRO
  reciben un icono PRO exclusivo <span class="nb">({icon})</span> en la interfaz.
sectionTitleIi: "Incluye todo lo que te gusta de la versión gratuita"
sectionParagraphIi: >
  Actualizar a SQLite Viewer PRO es una experiencia fluida. Solo ingresa la clave de licencia y estás listo.
  Además de nuevas y exclusivas funciones PRO, todo lo que te gusta de la versión gratuita permanece igual.
free1H: "UI de alto rendimiento"
free1P: >
  SQLite Viewer está construido pensando en el rendimiento. Utiliza las mejores herramientas que ofrece la pila web y se __prueba rutinariamente
  en hardware más antiguo__ para garantizar que el rendimiento siga siendo de primera clase.
free2H: "Tema coincidente"
free2P: >
  Di adiós a las interfaces de usuario desarticuladas. SQLite Viewer __se ajusta automáticamente a tu tema de VS Code__ y se integra
  perfectamente en la experiencia existente de VS Code.
free3H: "Configuración con un clic"
free3P: >
  SQLite Viewer no depende de binarios en tu máquina. Trae los suyos propios, de modo que __simplemente haciendo clic en 'Instalar' se completa
  la configuración__. Toda la extensión pesa solo 15 MB.
free4H: "Funciona en cualquier lugar"
free4P: >
  Ya sea que estés usando Cursor, VS Codium, CodeSandbox, GitPod, Google IDX u otros forks de VS Code, __SQLite Viewer se adapta a su entorno__
  y proporciona tantas funciones como sea posible.
free5H: "Operado por el propietario"
free5P: >
  SQLite Viewer está creado por un único desarrollador dedicado. Disfruta de una __visión coherente y atención al detalle__ que rara vez
  se encuentra en productos puramente comerciales.
