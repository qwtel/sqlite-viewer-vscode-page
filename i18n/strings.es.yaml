card1H: "Exportar datos en varios formatos"
card1P: >
  Puedes copiar filas directamente desde el visor en varios formatos. Los formatos compatibles son:
  TSV, CSV, inserciones de SQLite, objetos JSON, arrays JSON, HTML y Markdown.
card2H: "Actualizar valores en el lugar"
card2P: >
  Actualiza valores desde la barra lateral o el modal. Todos los cambios se envuelven automáticamente en una transacción
  y se confirman en el disco cuando se guarda el archivo.
card3H: "Insertar y eliminar filas"
card3P: >
  Inserta una o más filas usando el cuadro de diálogo modal. Elimina una o más filas desde el explorador o usando
  atajos de teclado.
card4H: "Deshacer y rehacer cambios usando VS Code"
card4P: >
  SQLite Viewer PRO se integra con el historial de deshacer/rehacer de VS Code. Los cambios se revierten a través de instrucciones `ROLLBACK`
  antes de que se guarde un archivo, y ejecutando instrucciones SQL (invertidas) después.
card5H: "Funciona en contenedores, SSH y WSL"
card5P: >
  SQLite Viewer PRO se puede instalar dentro de contenedores, hosts SSH e instancias WSL. Una instancia nativa de SQLite
  se ejecuta junto con la base de datos en el espacio de trabajo remoto, mientras que solo la vista web permanece en la máquina local.
