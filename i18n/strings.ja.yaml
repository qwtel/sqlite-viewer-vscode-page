faq1Summary: "**購入後にPROバージョンをインストールするにはどうすればよいですか？**"
faq1Content: >
  PROバージョンはすでにインストールされています！必要なのはアクティベーションだけです。購入が完了すると、
  レコードの商人からライセンスキーを取得する方法についての指示が記載されたメールが届きます。
  *アクティベーションはVS Code内で行われ、数秒で完了します*:<br><br>
  **コマンドパレット**を開き、**"ライセンスキーをアクティブ化"**&shy;と入力します。あるいは、SQLite Viewerタブ内の&shy;**"PROにアップグレード"**&shy;ダイアログを開き、
  ページの下部までスクロールして&shy;**"ライセンスキーを入力"**&shy;をクリックします。VS Codeウィンドウの上部に入力フィールドが表示されます。
  ライセンスキーを貼り付けてEnterキーを押します。数秒以内にシステムダイアログがアクティベーションを確認します。
faq2Summary: "PROバージョンを複数のデバイスで使用できますか？"
faq2Content: >
  SQLite Viewer PROは*無制限の数のデバイス*でアクティベートでき、*最大3つのデバイス*で同時に使用できます。<br><br>
  アクティベーション頻度にいくつかの制限がありますが、これらはキーの共有/公開やその他の悪用を防ぐためだけに設けられています。
  *大多数のお客様はライセンスの問題に遭遇することはありません*。
faq3Summary: "オフラインライセンス認証はどのように機能しますか？"
faq3Content: >
  **コマンドパレット**から&shy;**"オフラインライセンス認証"**&shy;を選択すると、オフラインアクティベーションページにリダイレクトされます。
  *このページは任意のデバイスで開くことができます*&shy;。ライセンスキーを入力すると、アクティベーショントークンが表示されます。
  このトークンを任意のチャネル（例：メール、Slack、USBドングル）を通じて対象デバイスに送信し、
  オフラインライセンス認証ウィザードの最後の入力フィールドに貼り付けることができます。トークンの確認にインターネット接続は必要ありません。<br><br>
  この方法で登録されたデバイスは、Business Editionキーが使用され、トークン生成時に"Business Edition評価"チェックボックスがチェックされていない限り、
  ライセンスサーバーへの接続を試行することはありません。
faq4Summary: "返金はどのようにリクエストしますか？"
faq4Content: >
  返金をリクエストするには、購入時に使用したメールアドレスで[*refunds@sqliteviewer.app*](mailto:refunds@sqliteviewer.app)に連絡してください。<br><br>
  SQLite Viewer PROには**14日間返金保証**が付いています。この期間内であれば、理由を問わず全額返金をリクエストできます—説明は不要です。
  14日を過ぎた場合の返金は、特定の事情がある場合にのみ検討されます。詳細は[返金](/refunds.html)ページをご覧ください。
faq5Summary: "サポートされている日時形式は何ですか？"
faq5Content: >
  SQLite Viewer PROは、`DATE`または`DATETIME`として定義された列に対して、幅広い日時形式をサポートしています。サポートされる入力形式には以下が含まれます：<br><br>
  • SQLite ISO風文字列<br>
  • ISO-8601文字列<br>
  • ユリウス通日<br>
  • 1970年からの秒（Unixタイムスタンプ）<br>
  • 1970年からのミリ秒<br>
  • 1970年からのマイクロ秒<br>
  • Excelシリアル日付（1900システム）<br>
  • 1601年からのWindows FILETIME<br>
  • 0001年からの.NET Ticks<br><br>
  有効な日付が認識されると、4形式のいずれかで表示できます：<br>
  • ローカライズされた人間が読める文字列（デフォルト）<br>
  • ローカライズされた「X前」形式（例：「6ヶ月前」）<br>
  • マシンフレンドリーなISO-8601文字列<br>
  • 生の値<br><br>
  値は汎用の日付ピッカーで編集するか、解釈されたISO文字列を変更して編集できます。拡張機能はディスクに保存する際に元の形式を保持します。
faq6Summary: "PROバージョンで本番データベースを表示できますか？"
faq6Content: >
  はい、ただし準備することを強くお勧めします。<br><br>
  データの表示のみを行う場合は、誤った変更を防ぐため、ライブデータベースを読み取り専用モードで開いてください。
  ファイルを右クリックし、**「別のアプリで開く…」**をクリックして**「SQLite Viewer（読み取り専用）」**を選択してください。<br><br>
  ライブデータベースを変更する場合は、VS Codeの設定メニューから**「Sqlite Viewer: Instant Commit」**機能を有効にすることを強くお勧めします。
  これにより、同じデータベースにアクセスする他のSQLiteプロセスをブロックする可能性のある長時間のトランザクションを拡張機能が開くことを防ぎます。
  ただし、このモードでは元に戻す/やり直す機能が制限される場合があります。<br><br>
footnote1: >
  企業のファイアウォールがライセンスサーバーへの接続を妨げる場合、オフラインアクティベーションが必要です。
footnote2: >
  デバイスがオフラインアクティベーションを通じて登録されると、ライセンスサーバーに再接続することなく拡張機能を使用できます。
