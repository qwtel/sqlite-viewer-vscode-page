ctaH: "Möchten Sie es zuerst ausprobieren? Nutzen Sie die 14-Tage-Rückerstattungsgarantie"
ctaP: >
  Sie können SQLite Viewer PRO bis zu zwei Wochen lang testen und von der [14-Tage-Rückerstattungsgarantie](/refunds.html) Gebrauch machen.
  Um eine Rückerstattung zu beantragen, senden Sie einfach eine E-Mail an [*refunds@sqliteviewer.app*](mailto:refunds@sqliteviewer.app) mit der beim
  Kauf verwendeten E-Mail-Adresse – keine Erklärung erforderlich.
faq1Summary: "__Wie installiere ich die PRO-Version nach dem Kauf?__"
faq1Content: >
  Sie haben die PRO-Version bereits installiert! Alles, was benötigt wird, ist die Aktivierung. Nach Abschluss des Kaufs erhalten Sie eine E-Mail vom
  Merchant of Record mit Anweisungen, wie Sie den Lizenzschlüssel einlösen können. _Die Aktivierung erfolgt direkt in VS Code selbst und dauert nur
  wenige Sekunden_:<br><br>
  Öffnen Sie die __Befehlspalette__ und geben Sie __"Lizenzschlüssel aktivieren"__ ein. Alternativ können Sie den Dialog __"Auf PRO upgraden"__
  in einem SQLite Viewer-Tab öffnen, zum unteren Ende der Seite scrollen und auf __"Lizenzschlüssel eingeben"__ klicken. Ein Eingabefeld wird am oberen Rand des
  VS Code-Fensters geöffnet. Fügen Sie den Lizenzschlüssel ein und drücken Sie die Eingabetaste. Ein Systemdialog bestätigt die Aktivierung innerhalb weniger Sekunden.
faq2Summary: "Kann ich die PRO-Version auf mehreren Geräten verwenden?"
faq2Content: >
  Sie können SQLite Viewer PRO auf einer _unbegrenzten Anzahl von Geräten_ aktivieren und es gleichzeitig auf _bis zu 3 Geräten_ verwenden.<br><br>
  Es gibt einige Einschränkungen bei der Aktivierungshäufigkeit, aber diese dienen ausschließlich dazu, das Teilen/Veröffentlichen von Schlüsseln und andere Missbräuche zu verhindern.
  _Die überwiegende Mehrheit der Kunden hat nie Probleme mit der Lizenzierung_.
faq3Summary: "Wie funktioniert die Offline-Lizenzaktivierung?"
faq3Content: >
  Wenn Sie __"Offline-Lizenzaktivierung"__ aus der __Befehlspalette__ auswählen, werden Sie zur Offline-Aktivierungsseite weitergeleitet.
  _Sie können diese Seite auf jedem Gerät öffnen_. Geben Sie Ihren Lizenzschlüssel ein und Sie erhalten ein Aktivierungstoken.
  Sie können dieses Token dann über jeden Kanal (z.B. E-Mail, Slack, USB-Stick) an das gewünschte Gerät senden
  und es in das Eingabefeld am Ende des Offline-Lizenzaktivierungsassistenten einfügen. Keine Internetverbindung ist erforderlich, um das Token zu überprüfen.<br><br>
  Geräte, die über diese Methode registriert wurden, versuchen nie, sich mit dem Lizenzserver zu verbinden,
  vorausgesetzt, ein Business Edition-Schlüssel wurde verwendet und die "Business Edition-Evaluierung"-Checkbox beim Generieren des Tokens nicht aktiviert war.
footnote1: "Die Offline-Aktivierung ist erforderlich, wenn eine Unternehmens-Firewall die Verbindung zur Lizenzserver verhindert."
footnote2: "Sobald ein Gerät durch die Offline-Aktivierung registriert wurde, kann die Erweiterung ohne erneute Verbindung zum Lizenzserver genutzt werden."
