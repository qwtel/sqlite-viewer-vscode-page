faq1Summary: "__Comment installer la version PRO après l'achat ?__"
faq1Content: >
  Vous avez déjà la version PRO installée ! Tout ce qui est nécessaire est de l'activer. Après l'achat, vous recevrez un email du marchand
  avec des instructions sur comment réclamer la clé de licence. _L'activation se fait directement dans VS Code et ne prend que quelques secondes_:<br><br>
  Ouvrez la __Palette de commandes__ et tapez __"Activer la clé de licence"__. Sinon, vous pouvez ouvrir le dialogue __"Passer à PRO"__
  dans un onglet SQLite Viewer, faites défiler jusqu'en bas de la page et cliquez sur __"Entrer la Clé de Licence"__. Un champ d'entrée s'ouvrira
  en haut de la fenêtre VS Code. Collez la clé de licence et appuyez sur entrée. Une boîte de dialogue système confirmera l'activation en quelques secondes.
faq2Summary: "Puis-je utiliser la version PRO sur plusieurs appareils ?"
faq2Content: >
  Vous pouvez activer SQLite Viewer PRO sur un _nombre illimité d'appareils_, et l'utiliser sur _jusqu'à 3 appareils simultanément_.<br><br>
  Il y a quelques restrictions sur la fréquence d'activation, mais celles-ci sont uniquement en place pour empêcher le partage/publication de clés et autres abus.
  _La grande majorité des clients ne rencontrent jamais de problèmes de licence_.
faq3Summary: "Comment fonctionne l'activation de licence hors ligne ?"
faq3Content: >
  En sélectionnant __"Activation de licence hors ligne"__ depuis la __Palette de commandes__, vous serez redirigé vers la page d'activation hors ligne.
  _Vous pouvez ouvrir cette page sur n'importe quel appareil_. Entrez votre clé de licence et vous recevrez un token d'activation.
  Vous pouvez ensuite envoyer ce token à l'appareil destiné par n'importe quel canal (ex. email, Slack, clé USB)
  et le coller dans le champ de saisie à la fin de l'assistant d'activation de licence hors ligne. Aucune connexion internet n'est requise pour vérifier le token.<br><br>
  Les appareils enregistrés par cette méthode ne tenteront jamais de se connecter au serveur de licence,
  à condition qu'une clé Business Edition ait été utilisée et que la case "Évaluation Business Edition" n'ait pas été cochée lors de la génération du token.
faq4Summary: "Comment demander un remboursement ?"
faq4Content: >
  Pour demander un remboursement, contactez [*refunds@sqliteviewer.app*](mailto:refunds@sqliteviewer.app) avec l'adresse email utilisée lors de l'achat.<br><br>
  SQLite Viewer PRO est livré avec une __Garantie de Remboursement de 14 jours__. Pendant cette période, vous pouvez demander un remboursement complet pour quelque raison que ce soit — aucune explication requise.
  Les remboursements en dehors de la fenêtre de 14 jours ne sont envisagés que dans certaines circonstances. Pour plus de détails, consultez la page [Remboursements](/refunds.html).
faq5Summary: "Quels formats de date et heure sont pris en charge ?"
faq5Content: >
  SQLite Viewer PRO prend en charge une large gamme de formats de date et heure pour les colonnes définies comme `DATE` ou `DATETIME`. Les formats d'entrée pris en charge incluent :<br><br>
  • Chaînes de type ISO SQLite<br>
  • Chaînes ISO-8601<br>
  • Numéros de jour julien<br>
  • Secondes depuis 1970 (timestamp Unix)<br>
  • Millisecondes depuis 1970<br>
  • Microsecondes depuis 1970<br>
  • Date série Excel (système 1900)<br>
  • Windows FILETIME depuis 1601<br>
  • .NET Ticks depuis 0001<br><br>
  Lorsqu'une date valide est reconnue, elle peut être affichée dans l'un des 4 formats :<br>
  • Chaînes localisées lisibles (par défaut)<br>
  • Chaînes localisées de type « il y a X » (ex. « il y a 6 mois »)<br>
  • Chaînes ISO-8601 pour machines<br>
  • Valeurs brutes<br><br>
  Les valeurs peuvent être modifiées via un sélecteur de date générique ou en modifiant la chaîne ISO interprétée. L'extension préserve le format d'origine lors de l'enregistrement sur disque.
faq6Summary: "Puis-je utiliser la version PRO pour consulter des bases de données de production ?"
faq6Content: >
  Oui, mais il est fortement recommandé de prendre des précautions.<br><br>
  Si vous souhaitez uniquement consulter les données, ouvrez la base en direct en mode lecture seule pour éviter toute modification accidentelle.
  Clic droit sur le fichier, cliquez sur __"Ouvrir avec…"__ et sélectionnez __"SQLite Viewer (lecture seule)"__.<br><br>
  Si vous souhaitez modifier la base en direct, il est fortement recommandé d'activer la fonction __"Sqlite Viewer: Instant Commit"__ dans les paramètres VS Code.
  Cela évitera que l'extension n'ouvre des transactions longues qui pourraient bloquer d'autres processus SQLite accédant à la même base.
  Notez toutefois que les fonctions annuler/rétablir peuvent être limitées dans ce mode.<br><br>
footnote1: >
  L'activation hors ligne est nécessaire si un pare-feu d'entreprise empêche l'extension de se connecter au serveur de licence.
footnote2: >
  Quand un appareil est enregistré via l'activation hors ligne, l'extension peut être utilisée sans avoir besoin de se reconnecter au serveur de licence.
